  <script>
    /** 🚀 前後端對接核心：模擬 google.script.run 物件 */
    async function callGas(action, params = {}) {
      const url = new URL(GAS_URL);
      url.searchParams.append('key', MY_KEY);
      url.searchParams.append('action', action);
      for (const [k, v] of Object.entries(params)) {
        if (typeof v === 'object') url.searchParams.append(k, JSON.stringify(v));
        else url.searchParams.append(k, v);
      }
      const response = await fetch(url);
      const result = await response.json();
      if (result.error) throw new Error(result.error);
      return result;
    }

    window.google = {
      script: {
        run: {
          withSuccessHandler: function(callback) {
            return {
              getAppData: async () => { try { const d = await callGas('getAppData'); callback(d); document.getElementById('loading').style.display='none'; } catch(e) { alert('載入失敗：'+e); } },
              getTickerDetail: async (tk) => { const d = await callGas('getTickerDetail', {ticker: tk}); callback(d); },
              updateTarget: async (type, val, name) => { const d = await callGas('updateTarget', {type, val, itemName: name}); callback(d); },
              addTrade: async (d) => { const res = await callGas('addTrade', d); callback(res); }
            };
          }
        }
      }
    };

    /** 🚀 以下完整保留你原本 html.txt 的所有邏輯 */
    let appData = {};
    let charts = { trend: null };
    let currentDetailTicker = '', currentDetailMarket = '';
    let currentDetailData = { lots: [], divs: [], realized: [] };
    let currentLotId = '', currentMaxQty = 0; 
    let activeInputType = '', activeInputName = '';

    const trendLabelsPlugin = {
      id: 'trendLabels',
      afterDatasetsDraw(chart) {
        const { ctx, data } = chart;
        const meta = chart.getDatasetMeta(0);
        const dataArr = data.datasets[0].data;
        if (!dataArr || !dataArr.length) return;
        const maxVal = Math.max(...dataArr), minVal = Math.min(...dataArr);
        const maxIdx = dataArr.indexOf(maxVal), minIdx = dataArr.lastIndexOf(minVal);
        const lastIdx = dataArr.length - 1;
        const targetIndices = [...new Set([0, lastIdx, maxIdx, minIdx])];
        ctx.save();
        ctx.font = 'bold 12px -apple-system';
        ctx.textBaseline = 'middle';
        targetIndices.forEach(idx => {
          const pt = meta.data[idx];
          if (!pt) return;
          const val = dataArr[idx];
          const text = '$' + Math.round(val).toLocaleString();
          let yOffset = -25; if (val === minVal && val !== maxVal) yOffset = 25; 
          ctx.textAlign = 'center';
          if (idx === 0) ctx.textAlign = 'left';
          else if (idx === lastIdx) ctx.textAlign = 'right';
          ctx.beginPath(); ctx.arc(pt.x, pt.y, 4, 0, 2 * Math.PI); ctx.fillStyle = '#fff'; ctx.fill();
          const textW = ctx.measureText(text).width;
          ctx.fillStyle = 'rgba(28, 28, 30, 0.8)'; ctx.fillRect(pt.x - textW/2 - 4, pt.y + yOffset - 10, textW + 8, 20);
          ctx.fillStyle = '#fff'; ctx.fillText(text, pt.x, pt.y + yOffset);
        });
        ctx.restore();
      }
    };
    Chart.register(trendLabelsPlugin);

    function showAlert(msg, title = "提示") { document.getElementById('alert-title').innerText = title; document.getElementById('alert-msg').innerText = msg; document.getElementById('modal-alert').classList.remove('hidden'); }
    function closeAlert() { document.getElementById('modal-alert').classList.add('hidden'); }

    const fmt = (v, type, market) => {
      const n = parseFloat(v) || 0;
      const isUS = market === '美股';
      if (type === 'qty') return isUS ? n.toFixed(5).replace(/\.?0+$/, '') : Math.round(n).toLocaleString();
      if (type === 'price' || type === 'ceil2') {
        const rounded = n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        return isUS ? `${rounded} 美元` : `${rounded} 元`;
      }
      return `<span class="whitespace-nowrap">$ ${Math.round(n).toLocaleString()}</span>`;
    };

    const fmtTodayPL = (v, market) => `$ ${Math.round(Math.abs(parseFloat(v) || 0)).toLocaleString()}`;
    const getValColorClass = (val) => { if (Math.abs(val) < 0.0001) return 'text-white'; return val > 0 ? 'gain' : 'loss'; };

    function nav(id) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active'));
      document.getElementById('nav-' + id).classList.add('nav-active');
      if(id !== 'trade') load();
    }

    function load() { google.script.run.withSuccessHandler(data => { appData = data; renderOverview(); renderInvest(); }).getAppData(); }

    function renderOverview() {
      document.getElementById('net-worth').innerHTML = fmt(appData.netWorth);
      document.getElementById('goal-text').innerHTML = '目標 ' + fmt(appData.retirementGoal);
      document.getElementById('goal-pct').innerText = appData.goalPct || "0%";
      document.getElementById('progress-bar').style.width = Math.min(parseFloat(appData.goalPct)||0, 100) + '%';
      const debtData = appData.debtCat || { value: 0, pctStr: "0%", children: [] };
      document.getElementById('debt-container').innerHTML = `<div class="w-full bg-gray-600 absolute bottom-0" style="height: ${debtData.pctStr}; transition: height 1s;"></div>${debtData.value > 0 ? `<div class="label-above" style="bottom: ${debtData.pctStr}; transition: bottom 1s;"><span>${debtData.pctStr} 負債</span></div>` : ''}`;
      let tV = 0; appData.categories.forEach(c => { if(c.value > 0) tV += c.value; });
      let stackHtml = '';
      appData.categories.forEach(c => {
        if(c.value <= 0) return;
        const cp = (c.value / tV * 100).toFixed(1) + "%";
        if (c.children?.length > 0) {
          c.children.forEach(ch => {
            const chp = (ch.value / tV * 100).toFixed(1) + "%";
            stackHtml += `<div class="v-item" style="height:${chp}; background:${ch.color}"><span class="v-label">${chp}</span><span class="v-sub">${ch.name}</span></div>`;
          });
        } else {
          stackHtml += `<div class="v-item" style="height:${cp}; background:${c.color}"><span class="v-label">${cp}</span><span class="v-sub">${c.name}</span></div>`;
        }
      });
      document.getElementById('asset-stack').innerHTML = stackHtml;
      let listHtml = '';
      appData.categories.forEach((c, i) => {
        if (c.value <= 0) return;
        const isLiquid = c.name.includes("流動") || c.name.includes("資金");
        const hasChildren = c.children?.length > 0;
        const idStr = isLiquid ? 'card-liquid' : `card-cat-${i}`;
        listHtml += `<div class="card select-none mb-3" id="${idStr}"><div class="flex justify-between items-center" ${hasChildren ? `onclick="toggleAccordion('acc-${i}', 'arr-${i}')"` : ''}><div class="flex items-center gap-2"><div class="badge-pct" style="background:${c.color}">${c.pct}</div><span class="font-bold text-lg">${c.name}</span>${hasChildren ? `<svg id="arr-${i}" class="rotate-icon w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>` : ''}</div><span class="font-bold text-lg">${fmt(c.value)}</span></div>${hasChildren ? `<div id="acc-${i}" class="accordion-content"><div class="pt-4 space-y-3 border-t border-white/10 mt-4 pl-2">${c.children.map((ch, ci) => `<div class="flex justify-between text-sm text-gray-300"><div class="flex items-center gap-2"><div class="badge-pct !bg-white/10">${ch.pct}</div><span>${ch.name}</span></div><span class="font-mono font-bold">${fmt(ch.value)}</span></div>`).join('')}</div></div>` : ''}</div>`;
      });
      if (debtData.value > 0) { listHtml += `<div class="card select-none opacity-90"><div class="flex justify-between items-center" onclick="toggleAccordion('acc-debt', 'arr-debt')"><div class="flex items-center gap-2"><div class="badge-pct" style="background:#8E8E93">${debtData.pctStr}</div><span class="font-bold text-lg">負債</span><svg id="arr-debt" class="rotate-icon w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg></div><span class="font-bold text-lg">-${fmt(debtData.value)}</span></div><div id="acc-debt" class="accordion-content"><div class="pt-4 space-y-3 border-t border-white/10 mt-4 pl-2">${debtData.children.map(ch => `<div class="flex justify-between text-sm text-gray-400"><div class="flex items-center gap-2"><div class="badge-pct !bg-white/10">${ch.pct}</div><span>${ch.name}</span></div><span class="font-mono font-bold">-${fmt(ch.value)}</span></div>`).join('')}</div></div></div>`; }
      document.getElementById('overview-list').innerHTML = listHtml;
      bindLP(document.getElementById('card-retirement'), 'retirement', '修改退休目標');
      const liqEl = document.getElementById('card-liquid'); if(liqEl) bindLP(liqEl, 'liquid', '修改流動資金');
    }

    function renderInvest() {
      const draw = (list, id, headId, m) => {
        const listEl = document.getElementById(id); const headEl = document.getElementById(headId);
        if(!list.length) { listEl.innerHTML = '<p class="text-gray-600 text-xs italic pl-2">無庫存</p>'; return; }
        list.sort((a, b) => parseFloat(b.pct) - parseFloat(a.pct));
        const activeLots = list.filter(s => s.qty > 0);
        const total = activeLots.reduce((a, b) => ({ cost: a.cost + (b.cost || 0), pl: a.pl + (b.pl || 0), val: (a.val || 0) + (b.value || 0), today: a.today + (b.todayPL || 0) }), { cost: 0, pl: 0, val: 0, today: 0 });
        const totalRoi = total.cost > 0 ? (total.pl / total.cost * 100) : 0;
        headEl.innerHTML = `<div class="px-1 mb-4"><h3 class="text-2xl font-black text-white uppercase tracking-tighter mb-3">${m}持倉</h3><div class="grid grid-cols-2 gap-3 bg-[#1c1c1e] p-4 rounded-2xl border border-white/5 shadow-inner"><div class="space-y-1"><span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block">持有成本</span><span class="text-xl font-black text-white/80">${fmt(total.cost, m, m)}</span></div><div class="text-right space-y-1"><span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block">目前市值</span><span class="text-xl font-black text-white">${fmt(total.val, m, m)}</span></div><div class="pt-2 border-t border-white/5"><span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block">未實現損益 (報酬率)</span><span class="text-base font-black ${getValColorClass(total.pl)}">${fmt(Math.abs(total.pl), m, m)} <span class="text-xs">(${totalRoi.toFixed(2)}%)</span></span></div><div class="text-right pt-2 border-t border-white/5"><span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block">市場今日損益</span><span class="text-base font-black ${getValColorClass(total.today)}">${fmtTodayPL(total.today, m)}</span></div></div></div>`;
        listEl.innerHTML = activeLots.map(s => `<div class="card mb-2" onclick="showDetail('${s.ticker}', '${m}')"><div class="flex justify-between items-start"><div class="flex flex-col gap-1 w-[65%]"><div class="flex items-center gap-2"><div class="badge-pct" style="background:${m==='美股'?'#8E8EE5':'#5856D6'}">${s.pct}</div><span class="text-xs font-bold text-gray-400 truncate max-w-[100px]">${s.ticker}</span></div><span class="font-black text-2xl text-white leading-none mt-1 truncate block">${m === '美股' ? s.ticker : s.name}</span><div class="grid grid-cols-2 gap-x-3 text-[10px] mt-2 opacity-80"><div class="flex justify-between border-r border-white/10 pr-2"><span class="text-gray-500 font-bold">現價</span><span class="text-gray-300 font-bold">${fmt(s.price, 'price', m)}</span></div><div class="flex justify-between"><span class="text-gray-500 font-bold">均價</span><span class="text-gray-300 font-bold">${fmt(s.avgPrice, 'price', m)}</span></div></div></div><div class="flex-shrink-0 flex flex-col text-right gap-1"><div class="font-black text-xl">${fmt(s.value, m, m)}</div><div class="text-sm font-bold ${getValColorClass(s.pl)}">${((s.roi) * 100).toFixed(2)}%</div></div></div></div>`).join('');
      };
      draw(appData.twStocks, 'list-tw', 'head-tw', '台股'); draw(appData.usStocks, 'list-us', 'head-us', '美股');
    }

    async function showDetail(tk, market) {
      currentDetailTicker = tk; currentDetailMarket = market;
      document.getElementById('detail-ticker').innerText = tk;
      document.getElementById('modal-detail').classList.remove('hidden');
      google.script.run.withSuccessHandler(data => { currentDetailData = data; switchDetailTab('lots'); }).getTickerDetail(tk);
    }

    function switchDetailTab(tab) {
      document.querySelectorAll('.detail-tab-btn').forEach(b => b.classList.remove('detail-tab-active'));
      document.getElementById(`btn-tab-${tab}`).classList.add('detail-tab-active');
      const container = document.getElementById('detail-list'); const summary = document.getElementById('detail-summary-card');
      const stockInfo = [...appData.twStocks, ...appData.usStocks].find(s => s.ticker === currentDetailTicker) || { cost:0, value:0, pl:0, roi:0 };
      const m = currentDetailMarket;
      if (tab === 'lots') {
        const totalQty = currentDetailData.lots.reduce((a, b) => a + (b.qty || 0), 0);
        summary.innerHTML = `<div class="grid grid-cols-2 gap-y-4"><div><p class="text-[10px] text-gray-500 font-bold">持有成本</p><p class="text-xl font-black">${fmt(stockInfo.cost, '', m)}</p></div><div class="text-right"><p class="text-[10px] text-gray-500 font-bold">目前市值</p><p class="text-xl font-black">${fmt(stockInfo.value, '', m)}</p></div><div><p class="text-[10px] text-gray-500 font-bold">未實現損益</p><p class="text-xl font-black ${getValColorClass(stockInfo.pl)}">${fmt(Math.abs(stockInfo.pl), '', m)}</p></div><div class="text-right"><p class="text-[10px] text-gray-500 font-bold">報酬率</p><p class="text-xl font-black ${getValColorClass(stockInfo.pl)}">${(stockInfo.roi * 100).toFixed(2)}%</p></div></div>`;
        container.innerHTML = currentDetailData.lots.map(d => `<div class="card !bg-[#2c2c2e] p-4 text-xs" id="lot-${d.lotId}"><div class="flex justify-between items-center mb-2"><span class="${getValColorClass(d.pl)} font-bold">${(d.roi * 100).toFixed(2)}%</span><span class="text-blue-400 font-black">${d.broker}</span></div><div class="grid grid-cols-2 gap-y-1 opacity-80"><span>股數: ${fmt(d.qty, 'qty', m)}</span><span class="text-right">日期: ${d.date}</span></div></div>`).join('');
        currentDetailData.lots.forEach(d => { const el = document.getElementById(`lot-${d.lotId}`); if(el) bindLP(el, 'sell-quick', '快速賣出', d); });
      } else if (tab === 'divs') {
        summary.innerHTML = `<p class="text-[10px] text-gray-500 font-bold">累計總股利</p><p class="text-3xl font-black text-yellow-500">${fmt(stockInfo.totalDiv || 0, '', m)}</p>`;
        container.innerHTML = currentDetailData.divs.map(d => `<div class="card !bg-[#2c2c2e] p-4 text-xs"><div class="flex justify-between"><span>${d.date}</span><span class="text-yellow-500 font-bold">${fmt(d.amount, '', m)}</span></div></div>`).join('');
      } else if (tab === 'realized') {
        summary.innerHTML = `<div class="grid grid-cols-2 gap-4"><div><p class="text-[10px] text-gray-500 font-bold">已實現損益</p><p class="text-xl font-black ${getValColorClass(stockInfo.realizedPL)}">${fmt(Math.abs(stockInfo.realizedPL), '', m)}</p></div><div class="text-right"><p class="text-[10px] text-gray-500 font-bold">報酬率</p><p class="text-xl font-black ${getValColorClass(stockInfo.realizedROI)}">${(stockInfo.realizedROI * 100).toFixed(2)}%</p></div></div>`;
        container.innerHTML = currentDetailData.realized.map(d => `<div class="card !bg-[#2c2c2e] p-4 text-xs"><div class="flex justify-between"><span>${d.date} 賣出</span><span class="${getValColorClass(d.pl)} font-bold">${fmt(Math.abs(d.pl), '', m)}</span></div></div>`).join('');
      }
    }

    function closeDetail() { document.getElementById('modal-detail').classList.add('hidden'); }
    function toggleAccordion(id, aid) { document.getElementById(id)?.classList.toggle('accordion-open'); document.getElementById(aid)?.classList.toggle('rotate-down'); }
    function handleTypeChange() { renderForm(); }
    function handleTickerInput() { /* 原本邏輯 */ }
    function renderForm() { 
      const t = document.getElementById('t-type').value; 
      let h = `<label>成交單價</label><input type="number" id="t-price" step="0.01" inputmode="decimal"><label>股數</label><input type="number" id="t-qty" inputmode="numeric">`;
      if(t==='配息') h = `<label>配息金額</label><input type="number" id="t-divP" step="0.01"><label>配息股數</label><input type="number" id="t-divQ">`;
      document.getElementById('dynamic-form').innerHTML = h;
    }

    async function submitTrade() {
      const b = document.getElementById('btn-save'); b.disabled = true; b.innerText = "傳送中...";
      const d = { date: document.getElementById('t-date').value, market: document.getElementById('t-market').value, ticker: document.getElementById('t-ticker').value, type: document.getElementById('t-type').value, broker: document.getElementById('t-broker').value, price: document.getElementById('t-price')?.value, qty: document.getElementById('t-qty')?.value };
      google.script.run.withSuccessHandler(() => { showAlert("同步成功"); b.disabled = false; b.innerText = "送出"; nav('overview'); }).addTrade(d);
    }

    function bindLP(el, type, msg, extra) {
      if(!el) return;
      let timer;
      const start = () => { timer = setTimeout(() => { if(type==='sell-quick') openQuickSell(extra); else openInput(type, msg, extra); }, 800); el.style.opacity = '0.5'; };
      const end = () => { clearTimeout(timer); el.style.opacity = '1'; };
      el.onmousedown = el.ontouchstart = start; el.onmouseup = el.ontouchend = el.onmouseleave = end;
    }

    function openInput(type, msg, name) { activeInputType = type; activeInputName = name; document.getElementById('input-title').innerText = msg; document.getElementById('modal-input').classList.remove('hidden'); }
    function closeInput() { document.getElementById('modal-input').classList.add('hidden'); }
    function submitInput() { const v = document.getElementById('input-val').value; if(v){ google.script.run.withSuccessHandler(load).updateTarget(activeInputType, v, activeInputName); closeInput(); } }
    
    function showTrend() {
      document.getElementById('modal-trend').classList.remove('hidden');
      setTimeout(() => {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if(charts.trend) charts.trend.destroy();
        charts.trend = new Chart(ctx, {
          type: 'line',
          data: { labels: appData.trendValues.map(v=>v.date).reverse(), datasets: [{ data: appData.trendValues.map(v=>v.value).reverse(), borderColor: '#5856d6', tension: 0.2, pointRadius: 5, pointBackgroundColor: '#fff' }] },
          options: { maintainAspectRatio: false, scales: { y: { display: false }, x: { display: false } }, plugins: { legend: false } }
        });
      }, 200);
    }
    function closeTrend() { document.getElementById('modal-trend').classList.add('hidden'); }
  </script>
</body>
</html>
