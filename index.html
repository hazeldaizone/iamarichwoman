<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" href="https://i.meee.com.tw/aE4Z130.png?v=4">
  <link rel="apple-touch-icon-precomposed" href="https://i.meee.com.tw/aE4Z130.png?v=4">
  <link rel="icon" type="image/png" href="https://i.meee.com.tw/aE4Z130.png?v=4">
  <link rel="shortcut icon" href="https://i.meee.com.tw/aE4Z130.png?v=4">
  <meta name="apple-mobile-web-app-title" content="我的私房錢">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>我的私房錢</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    /** 🚀 填入資訊 */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxpePft8fyeXro1ZPgTvF5Es4JAQBgbwFq145Qyd4UMOtwMssA2eAPs-4UKcdwbJ3iFSg/exec"; 
    const MY_KEY = "Hazel8_has8aLotof8_Money"; 

    /** 🛠️ 模擬 Google 環境 (讓原本功能不失效) */
    window.google = {
      script: {
        run: {
          withSuccessHandler: function(callback) {
            return {
              getAppData: async function() {
                const res = await fetch(`${GAS_URL}?key=${MY_KEY}&action=getAppData`);
                const data = await res.json();
                callback(data);
                document.getElementById('loading-screen').style.display = 'none';
              },
              getTickerDetail: async function(tk) {
                const res = await fetch(`${GAS_URL}?key=${MY_KEY}&action=getTickerDetail&ticker=${tk}`);
                const data = await res.json();
                callback(data);
              },
              addTrade: async function(d) {
                const params = new URLSearchParams(d).toString();
                const res = await fetch(`${GAS_URL}?key=${MY_KEY}&action=addTrade&${params}`);
                callback(await res.json());
              }
            };
          }
        }
      }
    };
  </script>

  <style>
    /* 此處省略 100% 原始 CSS，請保持原本 html.txt 裡的 style 內容 */
    body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; user-select: none; -webkit-user-select: none; overflow-x: hidden; }

    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; opacity: 0.4; }
    .nav-active { opacity: 1; border-top: 2px solid #fff; }
    .tab-content { display: none; padding: 16px; }
    .active { display: block; }
    .v-stack-container { display: flex; gap: 8px; height: 320px; margin-bottom: 32px; }
    .loading-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    /* ... 更多原始 CSS ... */
  </style>
</head>
<body class="pb-28">

  <div id="loading-screen" class="loading-screen">
    <div class="text-3xl font-black mb-4">HAZEL ASSET</div>
    <div class="animate-pulse text-gray-500">正在連接數據庫...</div>
  </div>

  <!-- 原本的 HTML 結構 (Tab, Overview, List 等) 全部放在這裡 -->
  <div id="tab-overview" class="tab-content active">
    <!-- 原本的淨資產、圖表等 HTML -->
    <div class="mt-8 mb-8 text-center" onclick="showTrend()">
      <p class="text-gray-500 text-[10px] font-bold">淨資產</p>
      <h1 id="net-worth" class="text-5xl font-black">$ 0</h1>
    </div>
    <div id="overview-list" class="space-y-3"></div>
  </div>
  
  <!-- 底部導覽列 -->
  <nav class="fixed bottom-0 inset-x-0 h-24 bg-black/90 border-t border-white/5 flex justify-around items-center z-40">
    <button onclick="nav('overview')" id="nav-overview" class="nav-btn nav-active">📊</button>
    <button onclick="nav('invest')" id="nav-invest" class="nav-btn">📈</button>
    <button onclick="nav('trade')" id="nav-trade" class="nav-btn">⊕</button>
  </nav>

  <script>
    /* 這裡請完整貼入原本 html.txt 裡面 script 標籤內的所有 function 邏輯 */
    /* 包括 renderOverview, renderInvest, showDetail 等 */
    window.onload = () => { load(); };
    function load() { google.script.run.withSuccessHandler(d => { /* 渲染數據 */ }).getAppData(); }
  </script>
</body>
