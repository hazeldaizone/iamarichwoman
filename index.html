  <script>
    /** 🚀 Vercel 橋樑配置：請務必填寫以下兩項 */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxpePft8fyeXro1ZPgTvF5Es4JAQBgbwFq145Qyd4UMOtwMssA2eAPs-4UKcdwbJ3iFSg/exec"; 
    const MY_KEY = "Hazel8_has8aLotof8_Money";

    /** 模擬 google.script.run，讓原本的所有代碼不必修改就能執行 */
    window.google = {
      script: {
        run: {
          withSuccessHandler: function(callback) {
            return {
              getAppData: function() { 
                callGasAPI('getAppData', null, callback); 
              },
              getTickerDetail: function(ticker) { 
                callGasAPI('getTickerDetail', { ticker: ticker }, callback); 
              },
              addTrade: function(tradeData) { 
                callGasAPI('addTrade', tradeData, callback); 
              },
              updateTarget: function(type, val, itemName) { 
                callGasAPI('updateTarget', { type: type, val: val, itemName: itemName }, callback); 
              }
            };
          }
        }
      }
    };

    async function callGasAPI(action, params, callback) {
      try {
        const url = new URL(GAS_URL);
        url.searchParams.append('key', MY_KEY);
        url.searchParams.append('action', action);
        
        if (params) {
          if (typeof params === 'object') {
            for (const key in params) {
              url.searchParams.append(key, params[key]);
            }
          } else {
            url.searchParams.append('data', params);
          }
        }

        const response = await fetch(url);
        const data = await response.json();
        
        if (data.error) {
          console.error("GAS 錯誤:", data.error);
          return;
        }
        
        if (callback) callback(data);
        // 載入完成後隱藏 Loading 畫面
        if (action === 'getAppData') {
          const loadingEl = document.getElementById('loading-spinner');
          if (loadingEl) loadingEl.style.display = 'none';
        }
      } catch (e) {
        console.error("通訊失敗:", e);
        alert("無法連線至資料庫，請檢查網路或密鑰設定");
      }
    }
  </script>

  <script>
    /** 🚀 以下是完整移植的原本 JavaScript 邏輯，不做任何刪減 */
    let appData = {};
    let charts = { trend: null };
    let currentDetailTicker = '';
    let currentDetailMarket = '';
    let currentDetailData = { lots: [], divs: [], realized: [] };
    let currentLotId = ''; 
    let currentMaxQty = 0; 
    let activeInputType = '', activeInputName = '';

    const trendLabelsPlugin = {
      id: 'trendLabels',
      afterDatasetsDraw(chart) {
        const { ctx, data } = chart;
        const meta = chart.getDatasetMeta(0);
        const dataArr = data.datasets[0].data;
        if (!dataArr || !dataArr.length) return;

        const maxVal = Math.max(...dataArr), minVal = Math.min(...dataArr);
        const maxIdx = dataArr.indexOf(maxVal), minIdx = dataArr.lastIndexOf(minVal);
        const lastIdx = dataArr.length - 1;
        const targetIndices = [...new Set([0, lastIdx, maxIdx, minIdx])];
        
        ctx.save();
        ctx.font = 'bold 12px -apple-system';
        ctx.textBaseline = 'middle';
        
        targetIndices.forEach(idx => {
          const pt = meta.data[idx];
          if (!pt) return;
          const val = dataArr[idx];
          const text = '$' + Math.round(val).toLocaleString();
          
          let yOffset = -25; 
          if (val === minVal && val !== maxVal) yOffset = 25; 
          
          ctx.textAlign = 'center';
          if (idx === 0) ctx.textAlign = 'left';
          else if (idx === lastIdx) ctx.textAlign = 'right';

          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 4, 0, 2 * Math.PI);
          ctx.fillStyle = '#fff';
          ctx.fill();

          const textW = ctx.measureText(text).width;
          ctx.fillStyle = 'rgba(28, 28, 30, 0.8)';
          ctx.fillRect(pt.x - textW/2 - 4, pt.y + yOffset - 10, textW + 8, 20);
          
          ctx.fillStyle = '#fff';
          ctx.fillText(text, pt.x, pt.y + yOffset);
        });
        ctx.restore();
      }
    };
    Chart.register(trendLabelsPlugin);

    function showAlert(msg, title = "提示") { document.getElementById('alert-title').innerText = title; document.getElementById('alert-msg').innerText = msg; document.getElementById('modal-alert').classList.remove('hidden'); }
    function closeAlert() { document.getElementById('modal-alert').classList.add('hidden'); }

    const fmt = (v, type, market) => {
      const n = parseFloat(v) || 0;
      const isUS = market === '美股';
      if (type === 'qty') {
        return isUS ? n.toFixed(5).replace(/\.?0+$/, '') : Math.round(n).toLocaleString();
      }
      if (type === 'price' || type === 'ceil2') {
        const rounded = n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        return isUS ? `${rounded} 美元` : `${rounded} 元`;
      }
      const s = Math.round(n).toLocaleString();
      return `<span class="whitespace-nowrap">$ ${s}</span>`;
    };

    const fmtTodayPL = (v, market) => {
      const n = Math.abs(parseFloat(v) || 0);
      const s = Math.round(n).toLocaleString();
      return `$ ${s}`;
    };

    const getValColorClass = (val) => {
      if (Math.abs(val) < 0.0001) return 'text-white';
      return val > 0 ? 'gain' : 'loss';
    };

    function nav(id) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active'));
      document.getElementById('nav-' + id).classList.add('nav-active');
      if(id !== 'trade') load();
    }

    function load() {
      google.script.run.withSuccessHandler(data => { 
        appData = data; 
        renderOverview(); 
        renderInvest(); 
      }).getAppData();
    }

    function renderOverview() {
      document.getElementById('net-worth').innerHTML = fmt(appData.netWorth);
      document.getElementById('goal-text').innerHTML = '目標 ' + fmt(appData.retirementGoal);
      document.getElementById('goal-pct').innerText = appData.goalPct || "0%";
      document.getElementById('progress-bar').style.width = Math.min(parseFloat(appData.goalPct)||0, 100) + '%';
      
      const debtData = appData.debtCat || { value: 0, pctStr: "0%", children: [] };
      document.getElementById('debt-container').innerHTML = `
        <div class="w-full bg-gray-600 absolute bottom-0" style="height: ${debtData.pctStr}; transition: height 1s;"></div>
        ${debtData.value > 0 ? `<div class="label-above" style="bottom: ${debtData.pctStr}; transition: bottom 1s;"><span>${debtData.pctStr} 負債</span></div>` : ''}`;
      
      let tV = 0; appData.categories.forEach(c => { if(c.value > 0) tV += c.value; });
      let stackHtml = '';
      appData.categories.forEach(c => {
        if(c.value <= 0) return;
        if (c.children?.length > 0) {
          c.children.forEach(ch => {
            const cp = (ch.value / tV * 100).toFixed(1) + "%";
            stackHtml += `<div class="v-item" style="height:${cp}; background:${ch.color}"><span class="v-label">${cp}</span><span class="v-sub">${ch.name}</span></div>`;
          });
        } else {
          const cp = (c.value / tV * 100).toFixed(1) + "%";
          stackHtml += `<div class="v-item" style="height:${cp}; background:${c.color}"><span class="v-label">${cp}</span><span class="v-sub">${c.name}</span></div>`;
        }
      });
      document.getElementById('asset-stack').innerHTML = stackHtml;
      
      let listHtml = '';
      appData.categories.forEach((c, i) => {
        if (c.value <= 0) return;
        const isLiquid = c.name.includes("流動") || c.name.includes("資金");
        const hasChildren = c.children?.length > 0;
        const idStr = isLiquid ? 'card-liquid' : `card-cat-${i}`;
        listHtml += `
          <div class="card select-none mb-3" id="${idStr}">
            <div class="flex justify-between items-center" ${hasChildren ? `onclick="toggleAccordion('acc-${i}', 'arr-${i}')"` : ''}>
              <div class="flex items-center gap-2">
                <div class="badge-pct" style="background:${c.color}">${c.pct}</div>
                <span class="font-bold text-lg">${c.name}</span>
                ${hasChildren ? `<svg id="arr-${i}" class="rotate-icon w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>` : ''}
              </div>
              <span class="font-bold text-lg">${fmt(c.value)}</span>
            </div>
            ${hasChildren ? `<div id="acc-${i}" class="accordion-content"><div class="pt-4 space-y-3 border-t border-white/10 mt-4 pl-2">${c.children.map((ch, ci) => `<div class="flex justify-between text-sm text-gray-300"><div class="flex items-center gap-2"><div class="badge-pct !bg-white/10">${ch.pct}</div><span>${ch.name}</span></div><span class="font-mono font-bold">${fmt(ch.value)}</span></div>`).join('')}</div></div>` : ''}
          </div>`;
      });

      if (debtData.value > 0) {
        listHtml += `<div class="card select-none opacity-90" id="card-debt-parent"><div class="flex justify-between items-center" onclick="toggleAccordion('acc-debt', 'arr-debt')"><div class="flex items-center gap-2"><div class="badge-pct" style="background:#8E8E93">${debtData.pctStr}</div><span class="font-bold text-lg">負債</span><svg id="arr-debt" class="rotate-icon w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin=\"round\" d="M19 9l-7 7-7-7"></path></svg></div><span class="font-bold text-lg">-${fmt(debtData.value)}</span></div><div id="acc-debt" class="accordion-content"><div class="pt-4 space-y-3 border-t border-white/10 mt-4 pl-2">${debtData.children.map((ch, idx) => `<div class="flex justify-between text-sm text-gray-400" id="lp-debt-${idx}"><div class="flex items-center gap-2"><div class="badge-pct !bg-white/10">${ch.pct}</div><span>${ch.name}</span></div><span class="font-mono font-bold">-${fmt(ch.value)}</span></div>`).join('')}</div></div></div>`;
      }
      document.getElementById('overview-list').innerHTML = listHtml;
      
      // 重新綁定長按事件
      bindLP(document.getElementById('card-retirement'), 'retirement', '修改退休目標');
      const liqEl = document.getElementById('card-liquid'); if(liqEl) bindLP(liqEl, 'liquid', '修改流動資金');
      debtData.children.forEach((ch, idx) => {
        const el = document.getElementById(`lp-debt-${idx}`);
        if(el) bindLP(el, 'debt', `修改 ${ch.name}`, ch.name);
      });
    }

    function renderInvest() {
      const draw = (list, id, headId, m) => {
        const listEl = document.getElementById(id);
        const headEl = document.getElementById(headId);
        if(!list.length) { listEl.innerHTML = '<p class="text-gray-600 text-xs italic pl-2">無庫存</p>'; return; }
        
        list.sort((a, b) => parseFloat(b.pct) - parseFloat(a.pct));
        const activeLots = list.filter(s => s.qty > 0);
        const historyLots = list.filter(s => s.qty <= 0);
        
        const total = activeLots.reduce((a, b) => ({ 
          cost: a.cost + (b.cost || 0), 
          pl: a.pl + (b.pl || 0), 
          val: (a.val || 0) + (b.value || 0),
          today: a.today + (b.todayPL || 0)
        }), { cost: 0, pl: 0, val: 0, today: 0 });
        
        const totalRoi = total.cost > 0 ? (total.pl / total.cost * 100) : 0;
        const roiColor = getValColorClass(total.pl);

        headEl.innerHTML = `
          <div class="px-1 mb-4">
            <h3 class="text-2xl font-black text-white uppercase tracking-tighter mb-3">${m}持倉</h3>
            <div class="grid grid-cols-2 gap-3 bg-[#1c1c1e] p-4 rounded-2xl border border-white/5 shadow-inner">
              <div class="space-y-1">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block">持有成本</span>
                <span class="text-xl font-black text-white/80">${fmt(total.cost, m, m)}</span>
              </div>
              <div class="text-right space-y-1">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block">目前市值</span>
                <span class="text-xl font-black text-white">${fmt(total.val, m, m)}</span>
              </div>
              <div class="pt-2 border-t border-white/5">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block">未實現損益 (報酬率)</span>
                <span class="text-base font-black ${roiColor}">${fmt(Math.abs(total.pl), m, m)} <span class="text-xs">(${totalRoi.toFixed(2)}%)</span></span>
              </div>
              <div class="text-right pt-2 border-t border-white/5">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest block">市場今日損益</span>
                <span class="text-base font-black ${getValColorClass(total.today)}">${fmtTodayPL(total.today, m)}</span>
              </div>
            </div>
          </div>
        `;
        
        const renderCard = (s, isHistory) => {
          const isUS = m === '美股';
          return `<div class="card mb-3" onclick="showDetail('${s.ticker}', '${m}')"><div class="flex justify-between items-start"><div class="flex flex-col gap-1 w-[65%]"><div class="flex items-center gap-2"><div class="badge-pct" style="background:${isHistory?'#444':(isUS?'#8E8EE5':'#5856D6')}">${s.pct}</div>${!isUS ? `<span class="text-xs font-bold text-gray-400 truncate max-w-[100px]">${s.ticker}</span>` : ''}</div><span class="font-black text-2xl text-white leading-none mt-1 truncate block">${isUS ? s.ticker : s.name}</span>${!isHistory ? `<div class="grid grid-cols-2 gap-x-3 text-[10px] mt-2 opacity-80"><div class="flex justify-between border-r border-white/10 pr-2"><span class="text-gray-500 font-bold">現價</span><span class="text-gray-300 font-bold">${fmt(s.price, 'price', m)}</span></div><div class="flex justify-between"><span class="text-gray-500 font-bold">持有</span><span class="text-gray-300 font-bold">${fmt(s.qty, 'qty', m)} 股</span></div><div class="flex justify-between border-r border-white/10 pr-2"><span class="text-gray-500 font-bold">均價</span><span class="text-gray-300 font-bold">${fmt(s.avgPrice, 'price', m)}</span></div><div class="flex justify-between"><span class="text-gray-500 font-bold">損平</span><span class="text-gray-300 font-bold">${fmt(s.breakEven, 'price', m)}</span></div></div>` : `<div class="grid grid-cols-1 gap-y-1 text-[10px] mt-2 opacity-80"><div class="flex justify-between"><span class="text-gray-500 font-bold">現價</span><span class="text-gray-300 font-bold">${fmt(s.price, 'price', m)}</span></div><div class="flex justify-between"><span class="text-gray-500 font-bold">累積總股利</span><span class="text-yellow-500 font-bold">${fmt(s.totalDiv || 0, '', m)}</span></div></div>`}</div><div class="flex-shrink-0 flex flex-col text-right gap-1"><div class="font-black text-xl">${isHistory ? '<div class="text-[10px] text-gray-500 font-bold uppercase">已實現</div>' : fmt(s.value, m, m)}</div><div class="text-sm font-bold ${getValColorClass(isHistory ? s.realizedPL : s.pl)}">${fmt(Math.abs(isHistory ? (s.realizedPL || 0) : s.pl), m, m)}</div><div class="text-sm font-bold ${getValColorClass(isHistory ? s.realizedROI : s.roi)}">${((isHistory ? (s.realizedROI || 0) : s.roi) * 100).toFixed(2)}%</div><div class="text-[10px] ${getValColorClass(s.todayPL)} font-bold mt-1 opacity-80">今日 ${fmtTodayPL(s.todayPL, m)}</div></div></div></div>`;
        };

        let html = activeLots.map(s => renderCard(s, false)).join('');
        if (historyLots.length > 0) {
          html += `<div class="mt-4 px-1"><button onclick="toggleAccordion('history-acc-${m}', 'history-arr-${m}')" class="flex items-center gap-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest opacity-60">顯示歷史持倉記錄 (${historyLots.length})<svg id="history-arr-${m}" class="rotate-icon w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin=\"round\" d="M19 9l-7 7-7-7"></path></svg></button><div id="history-acc-${m}" class=\"accordion-content\"><div class=\"pt-3 space-y-3\">${historyLots.map(s => renderCard(s, true)).join('')}</div></div></div>`;
        }
        listEl.innerHTML = html;
      };
      draw(appData.twStocks, 'list-tw', 'head-tw', '台股'); 
      draw(appData.usStocks, 'list-us', 'head-us', '美股');
    }

    function showDetail(tk, market) {
      currentDetailTicker = tk; currentDetailMarket = market;
      document.getElementById('detail-ticker').innerText = tk;
      document.getElementById('detail-list').innerHTML = '<p class="text-center py-10 text-gray-500 text-xs font-bold">載入中...</p>';
      document.getElementById('modal-detail').classList.remove('hidden');
      const stockInfo = [...appData.twStocks, ...appData.usStocks].find(s => s.ticker === tk) || { qty: 0 };
      const lotTabBtn = document.getElementById('btn-tab-lots');
      
      google.script.run.withSuccessHandler(data => {
         currentDetailData = data;
         if (stockInfo.qty <= 0) {
            if (lotTabBtn) lotTabBtn.style.display = 'none';
            if (currentDetailData.divs.length > 0) switchDetailTab('divs'); else switchDetailTab('realized');
         } else {
            if (lotTabBtn) lotTabBtn.style.display = 'block';
            switchDetailTab('lots');
         }
      }).getTickerDetail(tk);
    }

      if(activeBtn) activeBtn.classList.add('detail-tab-active');
      const container = document.getElementById('detail-list');
      const summary = document.getElementById('detail-summary-card');
      const stockInfo = [...appData.twStocks, ...appData.usStocks].find(s => s.ticker === currentDetailTicker) || { cost: 0, value:0, pl:0, realizedPL: 0, realizedROI: 0, totalDiv: 0, roi: 0 };
      const m = currentDetailMarket;

      if (tab === 'lots') {
        const marketPrice = currentDetailData.lots.length > 0 ? currentDetailData.lots[0].marketPrice : 0;
        const totalQty = currentDetailData.lots.reduce((acc, curr) => acc + (curr.qty || 0), 0);
        const roiColor = getValColorClass(stockInfo.pl);

            <div><p class="text-[10px] text-gray-500 font-bold uppercase">庫存股數</p><p class="text-xl font-black text-blue-400">${fmt(totalQty, 'qty', m)} 股</p></div>
            <div class="text-right"><p class="text-[10px] text-gray-500 font-bold uppercase">股票現價</p><p class="text-xl font-black text-blue-400">${fmt(marketPrice, 'price', m)}</p></div>
            <div class="pt-2 border-t border-white/5">
              <p class="text-[10px] text-gray-500 font-bold uppercase">未實現損益</p>

              <p class="text-[10px] text-gray-500 font-bold uppercase">報酬率</p>
              <p class="text-xl font-black ${roiColor}">${(stockInfo.roi * 100).toFixed(2)}%</p>
            </div>
          </div>`;

        container.innerHTML = currentDetailData.lots.map(d => `<div class="card !bg-[#2c2c2e] p-4 text-xs mb-3" id="lot-${d.lotId}"><div class="flex items-center mb-3 font-bold text-sm"><span class="${getValColorClass(d.pl)} w-1/3 text-left">${fmt(Math.abs(d.pl), '', m)}</span><span class="${getValColorClass(d.pl)} w-1/3 text-center">${(d.roi * 100).toFixed(2)}%</span><span class="text-blue-400 font-black w-1/3 text-right">${d.broker}</span></div><div class="grid grid-cols-2 gap-y-2 opacity-80"><div class="flex justify-between pr-2 border-r border-white/5"><span>股數</span><span class="font-bold">${fmt(d.qty, 'qty', m)} 股</span></div><div class="flex justify-between pl-2"><span>成本</span><span class="font-bold">${fmt(d.cost, '', m)}</span></div><div class="flex justify-between pr-2 border-r border-white/5"><span>成交單價</span><span class="text-white font-bold">${fmt(d.transPrice, 'price', m)}</span></div><div class="flex justify-between pl-2"><span>日期</span><span class="font-bold">${d.date}</span></div></div></div>`).join('');
        
        currentDetailData.lots.forEach(d => {
          const el = document.getElementById(`lot-${d.lotId}`);
          if (el) bindLP(el, 'sell-quick', '快速賣出', d);
        });
      } else if (tab === 'divs') {
        const totalDiv = stockInfo.totalDiv;
        const isUS = m === '美股';
        const feeLabel = isUS ? '稅金' : '匯費';
        summary.innerHTML = `<p class="text-[10px] text-gray-500 font-bold uppercase">累計總股利</p><p class="text-3xl font-black text-yellow-500">${fmt(totalDiv, '', m)}</p>`;
        container.innerHTML = currentDetailData.divs.map(d => `<div class="card !bg-[#2c2c2e] p-4 text-xs mb-3"><div class="flex justify-between mb-2"><span class="font-bold text-sm text-yellow-500">${fmt(d.amount, '', m)}</span><span class="text-gray-400 font-bold">${d.date}</span></div><div class="grid grid-cols-2 gap-y-1 opacity-80 text-[10px]"><div class="flex justify-between pr-2 border-r border-white/5"><span>股數</span><span class="font-bold">${fmt(d.qty, 'qty', m)} 股</span></div><div class="flex justify-between pl-2"><span>${feeLabel}</span><span class="font-bold">${fmt(d.fee, 'price', m)}</span></div><div class="flex justify-between pr-2 border-r border-white/5"><span>單價</span><span class="font-bold">${fmt(d.price, 'price', m)}</span></div><div class="flex justify-end pl-2"><span class="text-blue-300 font-bold">${d.broker}</span></div></div></div>`).join('') || '<p class="text-center text-gray-600 text-xs py-10 font-bold">目前無股利紀錄</p>';
      } else if (tab === 'realized') {
        summary.innerHTML = `<div class="grid grid-cols-2 gap-4"><div><p class="text-[10px] text-gray-500 font-bold uppercase">已實現損益（含息）</p><p class="text-xl font-black ${getValColorClass(stockInfo.realizedPL)}">${fmt(Math.abs(stockInfo.realizedPL), '', m)}</p></div><div class="text-right"><p class="text-[10px] text-gray-500 font-bold uppercase">報酬率</p><p class="text-xl font-black ${getValColorClass(stockInfo.realizedROI)}">${((stockInfo.realizedROI || 0)*100).toFixed(2)}%</p></div></div>`;
        if (!currentDetailData.realized.length) { container.innerHTML = '<p class="text-center text-gray-600 text-xs py-10 font-bold">無賣出紀錄</p>'; return; }
        container.innerHTML = currentDetailData.realized.map((d, ridx) => {
          const hasMulti = d.subLots && d.subLots.length > 1;
          return `<div class="card !bg-[#2c2c2e] p-4 text-xs mb-3" ${hasMulti ? `onclick="toggleAccordion('real-acc-${ridx}', 'real-arr-${ridx}')"` : ''}><div class="flex items-center mb-3 font-bold text-sm"><span class="${getValColorClass(d.pl)} w-1/3 text-left">${fmt(Math.abs(d.pl), '', m)}</span><span class="w-1/3 text-center ${getValColorClass(d.roi)}">${(d.roi * 100).toFixed(2)}%</span><div class="w-1/3 flex justify-end items-center gap-1"><span class="text-gray-400 font-bold text-[10px]">${d.date}</span>${hasMulti ? `<svg id="real-arr-${ridx}" class="rotate-icon w-3 h-3 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>` : ''}</div></div><div class="grid grid-cols-2 gap-y-1 opacity-80 mb-1"><div class="flex justify-between pr-2 border-r border-white/5"><span>股數</span><span class="font-bold">${fmt(d.qty, 'qty', m)} 股</span></div><div class="flex justify-between pl-2"><span>手續費</span><span class="font-bold">${fmt(d.fee, 'price', m)}</span></div><div class="flex justify-between pr-2 border-r border-white/5"><span>${hasMulti?'平均買入':'買入價'}</span><span class="font-bold">${fmt(d.buyPrice, 'price', m)}</span></div><div class="flex justify-between pl-2"><span>賣出價</span><span class="font-bold">${fmt(d.sellPrice, 'price', m)}</span></div></div>${hasMulti ? `<div id="real-acc-${ridx}" class="accordion-content border-t border-white/5 mt-2 pt-2 space-y-2">${d.subLots.map(sl => `<div class="flex justify-between text-[10px] text-gray-400"><span>${sl.date} 買入 ${fmt(sl.buyPrice, 'price', m)}　${fmt(sl.qty, 'qty', m)} 股</span><span>${sl.broker}</span></div>`).join('')}</div>` : `<div class="text-right text-blue-300 font-bold">${d.broker}</div>`}</div>`;
        }).join('');
      }
    }

    function closeDetail() { document.getElementById('modal-detail').classList.add('hidden'); }

    function updateQuickSellId() {
      const q = parseFloat(document.getElementById('qs-qty').value) || 0;
      const err = document.getElementById('qs-qty-error'); const btn = document.getElementById('qs-submit-btn');
      if (q > currentMaxQty) { if(err) err.style.display = 'block'; btn.disabled = true; btn.style.opacity = '0.4'; }
      else { if(err) err.style.display = 'none'; btn.disabled = false; btn.style.opacity = '1'; }
      document.getElementById('qs-sellId').value = (q > 0 && q < currentMaxQty) ? currentLotId + ':' + q : currentLotId;
    }

    function submitQuickSell() {
      const v = id => { const el = document.getElementById(id); return (el && el.value !== "") ? el.value : ""; };
      const broker = document.getElementById('qs-broker').classList.contains('hidden') ? document.getElementById('qs-broker-select').value : document.getElementById('qs-broker').value;
      const d = { date: v('qs-date') || new Date().toISOString().split('T')[0], market: currentDetailMarket, ticker: currentDetailTicker, type: '賣出', broker: broker, price: v('qs-price'), qty: v('qs-qty'), sellId: v('qs-sellId'), fee: v('qs-fee') };
      google.script.run.withSuccessHandler(() => { showAlert("同步成功"); closeQuickSell(); closeDetail(); nav('overview'); }).addTrade(d);
    }

    function openQuickSell(lotData) {
      currentLotId = lotData.lotId; currentMaxQty = lotData.qty;
      document.getElementById('qs-sellId').value = currentLotId;
      document.getElementById('qs-qty').value = lotData.qty;
      document.getElementById('qs-price').value = '';
      document.getElementById('qs-fee').value = '';
      document.getElementById('qs-date').valueAsDate = new Date();
      const bInp = document.getElementById('qs-broker'); const bSel = document.getElementById('qs-broker-select');
      if (lotData.broker) { bInp.value = lotData.broker; bInp.classList.remove('hidden'); bSel.classList.add('hidden'); }
      else { bInp.classList.add('hidden'); bSel.classList.remove('hidden'); bSel.value = ""; }
      document.getElementById('qs-max-hint').innerText = `庫存：${fmt(currentMaxQty, 'qty', currentDetailMarket)} 股`;
      document.getElementById('modal-sell-quick').classList.remove('hidden');
    }

    function handleTypeChange() {
      const t = document.getElementById('t-type').value;
      if (t === '賣出' && document.getElementById('t-ticker').value.trim() !== '') fetchLots();
      else document.getElementById('lot-selector-wrap').classList.add('hidden');
      renderForm();
    }

    let tickerTimer;
    function handleTickerInput() {
      clearTimeout(tickerTimer);
      tickerTimer = setTimeout(() => { if (document.getElementById('t-type').value === '賣出') fetchLots(); }, 800);
    }

    function fetchLots() {
      const tk = document.getElementById('t-ticker').value.trim(); if (!tk) return;
      const container = document.getElementById('lot-list-container');
      document.getElementById('lot-selector-wrap').classList.remove('hidden');
      container.innerHTML = '<p class="text-xs p-2 text-gray-500 font-bold text-center">載入中...</p>';
      google.script.run.withSuccessHandler(data => {
        const lots = data.lots || [];
        if (!lots.length) { container.innerHTML = '<p class="text-xs p-2 text-red-400 font-bold text-center">查無庫存</p>'; return; }
        container.innerHTML = lots.map(d => `
          <div class="lot-item" id="lot-sel-${d.lotId}">
            <div class="lot-flex-row">
              <div class="lot-check-col"><input type="checkbox" class="lot-checkbox w-5 h-5" data-id="${d.lotId}" data-max="${d.qty}" onchange="updateLotUI('${d.lotId}')"></div>
              <div class="lot-info-col text-xs"><p class="font-bold text-white">${d.date}　${d.broker}</p><p class="text-gray-400">$${d.price}　剩 <b>${fmt(d.qty, 'qty', currentDetailMarket)}</b> 股</p></div>
              <div class="lot-input-col">
                <input type="number" id="lot-input-${d.lotId}" class="lot-input-style" value="${d.qty}" inputmode="decimal" oninput="validateLotInput('${d.lotId}')">
                <div id="lot-warn-${d.lotId}" class="text-[9px] text-red-500 font-bold hidden">超過庫存</div>
              </div>
            </div>
          </div>`).join('');
      }).getTickerDetail(tk);
    }

    function validateLotInput(id) {
      const input = document.getElementById(`lot-input-${id}`);
      const warn = document.getElementById(`lot-warn-${id}`);
      const cb = document.querySelector(`#lot-sel-${id} .lot-checkbox`);
      const max = parseFloat(cb.dataset.max);
      const val = parseFloat(input.value) || 0;
      if (val > max) { input.classList.add('lot-input-error'); warn.classList.remove('hidden'); }
      else { input.classList.remove('lot-input-error'); warn.classList.add('hidden'); }
      updateLotSelectionString();
    }

    function updateLotUI(id) {
      const cb = document.querySelector(`#lot-sel-${id} .lot-checkbox`);
      document.getElementById(`lot-sel-${id}`).classList.toggle('lot-item-selected', cb.checked);
      updateLotSelectionString();
    }

    function updateLotSelectionString() {
      const selected = []; let total = 0;
      document.querySelectorAll('.lot-checkbox:checked').forEach(cb => {
        const id = cb.dataset.id, max = parseFloat(cb.dataset.max);
        const q = parseFloat(document.getElementById(`lot-input-${id}`).value) || 0;
        if (q > 0) { 
          total += q; 
          selected.push(q === max ? id : `${id}:${q}`); 
        }
      });
      const sh = document.getElementById('t-sellId-hidden'); if(sh) sh.value = selected.join(',');
      const qtyInput = document.getElementById('t-qty');
      if(qtyInput) qtyInput.value = total > 0 ? total : '';
    }

    function resetTradeForm() {
      const formInputs = document.querySelectorAll('#tab-trade input, #tab-trade select');
      formInputs.forEach(el => {
        if (el.id === 't-date') return;
        if (el.tagName === 'SELECT') { el.selectedIndex = 0; } else { el.value = ''; }
      });
      document.getElementById('lot-selector-wrap').classList.add('hidden');
      document.getElementById('lot-list-container').innerHTML = '';
      renderForm();
    }

    function renderForm() {
      const t = document.getElementById('t-type').value; let h = '';
      const inp = (id, label, req = false) => `<label>${label}${req ? '<span class=\"req-star\">*</span>' : ''}</label><input type=\"number\" id=\"${id}\" step=\"0.01\" inputmode=\"decimal\">`;
      if(t === '買入' || t === '賣出') {
         h = `${inp('t-price','成交單價', true)}${inp('t-qty','股數', true)}<label>手續費／稅金</label><input type=\"number\" id=\"t-fee\" step=\"0.01\" inputmode=\"decimal\"><label>手續費折扣</label><input type=\"number\" id=\"t-discount\" placeholder=\"如 6折 輸入 6\" inputmode=\"decimal\">`;
         if(t === '賣出') h += `<input type=\"hidden\" id=\"t-sellId-hidden\">`;
      } else if(t === '配息') h = `${inp('t-divP','配息金額', true)}${inp('t-divQ','配息股數', true)}<label>匯費/稅金</label><input type=\"number\" id=\"t-other\" step=\"0.01\" inputmode=\"decimal\">`;
      else if(t === '折讓') h = inp('t-rebate','折讓金額', true);
      else if(t === '分割') h = `${inp('t-splitR','比例', true)}<label>分割當天股價</label><input type=\"number\" id=\"t-splitPx\" step=\"0.01\" inputmode=\"decimal\">`;
      document.getElementById('dynamic-form').innerHTML = h;
    }

    function submitTrade() {
      const v = id => { const el = document.getElementById(id); return (el && el.value !== "") ? el.value : ""; };
      const type = v('t-type'); if(!v('t-date') || !v('t-ticker')) return showAlert("請填寫必填欄位");
      const errors = document.querySelectorAll('.lot-input-error');
      if (type === '賣出' && errors.length > 0) return showAlert("賣出股數超過現有庫存");
      const tickerVal = "'" + v('t-ticker').trim();
      const b = document.getElementById('btn-save'); b.disabled = true; b.innerText = "傳送中...";
      
      const payload = { 
        date: v('t-date'), market: v('t-market'), ticker: tickerVal, type: type, broker: v('t-broker'), 
        price: v('t-price'), qty: v('t-qty'), sellId: v('t-sellId-hidden'), discount: v('t-discount'), 
        divP: v('t-divP'), divQ: v('t-divQ'), other: v('t-other'), rebate: v('t-rebate'), 
        splitR: v('t-splitR'), splitPx: v('t-splitPx'), fee: v('t-fee') 
      };
      
      google.script.run.withSuccessHandler(() => { 
        showAlert("同步成功"); 
        b.disabled = false; b.innerText = "送出"; 
        resetTradeForm(); nav('overview'); 
      }).addTrade(payload);
    }

    function bindLP(el, type, msg, name) {
      if(!el) return;
      let timer;
      const start = (e) => { 
        timer = setTimeout(() => { 
          if(type === 'sell-quick') openQuickSell(name); else openInput(type, msg, name); 
        }, 800); 
        el.style.opacity = '0.5'; 
      };
      const end = () => { clearTimeout(timer); el.style.opacity = '1'; };
      el.onmousedown = el.ontouchstart = start;
      el.onmouseup = el.ontouchend = el.onmouseleave = end;
    }

    function openInput(type, msg, name) { activeInputType = type; activeInputName = name; document.getElementById('input-title').innerText = msg; document.getElementById('modal-input').classList.remove('hidden'); }
    function closeInput() { document.getElementById('modal-input').classList.add('hidden'); }
    function submitInput() { const v = document.getElementById('input-val').value; if(v){ google.script.run.withSuccessHandler(load).updateTarget(activeInputType, v, activeInputName); closeInput(); } }
    function closeQuickSell() { document.getElementById('modal-sell-quick').classList.add('hidden'); }

    function showTrend() {
      document.getElementById('modal-trend').classList.remove('hidden');
      setTimeout(() => {
        if(charts.trend) charts.trend.destroy();
        const ctx = document.getElementById('trendChart').getContext('2d');
        let rawData = appData.trendValues ? [...appData.trendValues].reverse() : [];
        if(rawData.length === 0) rawData = [{ date: '今日', value: appData.netWorth }];
        charts.trend = new Chart(ctx, { 
          type: 'line', 
          data: { 
            labels: rawData.map(v=>v.date), 
            datasets: [{ 
              data: rawData.map(v=>v.value), 
              borderColor: '#5856d6', tension: 0.2, borderWidth: 2.5, pointBackgroundColor: '#fff',
              pointRadius: (ctx) => [0, ctx.chart.data.labels.length-1].includes(ctx.dataIndex) ? 5 : 0
            }] 
          }, 
          options: { 
            maintainAspectRatio: false, 
            layout: { padding: { top: 60, bottom: 60, left: 40, right: 40 } }, 
            scales: { y: { display: false }, x: { display: false } }, 
            plugins: { legend: false, tooltip: { enabled: true, callbacks: { label: (c) => ` $${c.raw.toLocaleString()}` } } } 
          } 
        });
      }, 200);
    }
    function closeTrend() { document.getElementById('modal-trend').classList.add('hidden'); }
    function toggleAccordion(id, aid) { document.getElementById(id)?.classList.toggle('accordion-open'); document.getElementById(aid)?.classList.toggle('rotate-down'); }
    
    window.onload = () => { 
      document.getElementById('t-date').valueAsDate = new Date(); 
      load(); 
      renderForm(); 
    };
  </script>
</body>
</html>
