<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111113">
    <title>資產總覽 PWA</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <section class="auth-screen hidden" id="auth-screen" aria-label="登入">
      <form class="auth-card" id="auth-form">
        <p class="eyebrow">資產總覽</p>
        <h1>輸入 PIN</h1>
        <p>需要驗證後才會從試算表讀取資料。</p>
        <label>
          PIN
          <input id="auth-pin" type="password" inputmode="numeric" autocomplete="current-password">
        </label>
        <button class="primary-button" type="submit">進入 PWA</button>
        <div class="trade-result hidden" id="auth-result"></div>
      </form>
    </section>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">資產總覽</p>
          <h1 id="page-title">總覽</h1>
        </div>
        <button class="ghost-button" id="refresh-button" type="button">更新</button>
      </header>
      <div class="app-status hidden" id="app-status"></div>

      <main>
        <section class="screen active" id="screen-overview" aria-label="總覽">
          <section class="hero-panel">
            <div class="hero-meta">
              <span>淨資產</span>
              <span id="latest-date">--</span>
            </div>
            <strong id="net-worth">$ --</strong>
            <div class="hero-change" id="net-change">今日 --</div>
          </section>

          <section class="retirement-panel" id="retirement-panel"></section>

          <section class="section-block">
            <div class="section-head">
              <h2>資產配置</h2>
              <span id="allocation-total">--</span>
            </div>
            <div class="allocation-bar" id="allocation-bar"></div>
            <div class="category-groups" id="category-list"></div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h2>本月損益</h2>
              <button class="link-button" data-nav="calendar" type="button">看月曆</button>
            </div>
            <div class="month-summary" id="overview-month-summary"></div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <h2>本地資料</h2>
              <span id="local-db-source">IndexedDB</span>
            </div>
            <div class="local-actions">
              <button class="secondary-button" id="backup-password-button" type="button">
                <span class="action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M15.5 7.5a4 4 0 1 0-2.1 3.5L15 12.6V15h2.4l1.2 1.2H21v-2.8l-5.5-5.9Z"/><path d="M8 8h.01"/></svg></span>
                設定備份密碼
              </button>
              <button class="secondary-button" id="backup-now-button" type="button">
                <span class="action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 11V8a5 5 0 0 1 10 0v3"/><path d="M6 11h12v10H6z"/><path d="M12 15v3"/></svg></span>
                立即加密備份
              </button>
              <button class="secondary-button" id="backup-download-button" type="button">
                <span class="action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3v11"/><path d="m8 10 4 4 4-4"/><path d="M5 19h14"/></svg></span>
                匯出最新備份
              </button>
              <button class="secondary-button" id="local-snapshot-button" type="button">
                <span class="action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 7h2l1.5-2h3L15 7h2a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3Z"/><path d="M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/></svg></span>
                建立本地快照
              </button>
              <button class="secondary-button" id="price-proxy-button" type="button">
                <span class="action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 17v-6a8 8 0 0 1 16 0v6"/><path d="M8 17v-6a4 4 0 0 1 8 0v6"/><path d="M12 17v-6"/></svg></span>
                設定股價端點
              </button>
              <label class="secondary-button file-button">
                <span class="action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 21V10"/><path d="m8 14 4-4 4 4"/><path d="M5 5h14"/></svg></span>
                匯入加密備份
                <input id="backup-restore-input" type="file" accept=".assetbackup,application/json">
              </label>
              <button class="secondary-button" id="bootstrap-import-button" type="button">
                <span class="action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M4 10h16"/><path d="M9 5v14"/><path d="M15 5v14"/></svg></span>
                匯入Sheet檔
              </button>
              <input id="sheet-import-input" class="hidden-file-input" type="file" accept=".xlsx,.xls,.json,application/json">
            </div>
            <div class="trade-result hidden" id="local-db-status"></div>
          </section>
        </section>

        <section class="screen" id="screen-trends" aria-label="趨勢">
          <div class="segmented" role="tablist" aria-label="趨勢視圖">
            <button class="segment active" data-trend-view="line" type="button">走勢</button>
            <button class="segment" data-trend-view="calendar" type="button">損益月曆</button>
            <button class="segment" data-trend-view="analysis" type="button">分析</button>
          </div>

          <section class="trend-view active" id="trend-line">
            <div class="section-block">
              <div class="section-head">
                <h2 id="trend-chart-title">淨資產走勢</h2>
                <span id="trend-chart-range">最近 30 筆</span>
              </div>
              <div class="trend-controls">
                <div class="chip-row" role="tablist" aria-label="走勢期間">
                  <button class="chip active" data-trend-range="30" type="button">30天</button>
                  <button class="chip" data-trend-range="90" type="button">90天</button>
                  <button class="chip" data-trend-range="180" type="button">半年</button>
                  <button class="chip" data-trend-range="all" type="button">全部</button>
                </div>
                <div class="chip-row" role="tablist" aria-label="走勢項目">
                  <button class="chip active" data-trend-series="netWorth" type="button">淨資產</button>
                  <button class="chip" data-trend-series="tw" type="button">台股</button>
                  <button class="chip" data-trend-series="us" type="button">美股</button>
                  <button class="chip" data-trend-series="cash" type="button">流動資金</button>
                </div>
              </div>
              <div class="chart-card">
                <svg id="net-chart" viewBox="0 0 360 180" role="img" aria-label="淨資產走勢圖"></svg>
              </div>
            </div>
            <div class="metric-grid" id="trend-metrics"></div>
          </section>

          <section class="trend-view" id="trend-calendar">
            <div class="calendar-toolbar">
              <button class="icon-button" id="prev-month" type="button" aria-label="上個月">‹</button>
              <strong id="calendar-title">--</strong>
              <button class="icon-button" id="next-month" type="button" aria-label="下個月">›</button>
            </div>
            <div class="calendar-mode">
              <button class="chip active" data-calendar-mode="total" type="button">總損益</button>
              <button class="chip" data-calendar-mode="tw" type="button">台股</button>
              <button class="chip" data-calendar-mode="us" type="button">美股</button>
              <button class="chip" data-calendar-mode="cash" type="button">流動資金收支</button>
            </div>
            <div class="month-summary" id="calendar-summary"></div>
            <div class="calendar-grid" id="calendar-grid"></div>
          </section>

          <section class="trend-view" id="trend-analysis">
            <div class="analysis-list" id="analysis-list"></div>
          </section>
        </section>

        <section class="screen" id="screen-holdings" aria-label="投資">
          <div class="segmented market-tabs" role="tablist" aria-label="市場">
            <button class="segment active" data-market="台股" type="button">台股</button>
            <button class="segment" data-market="美股" type="button">美股</button>
          </div>
          <section class="holding-summary" id="holding-summary"></section>
          <section class="holding-list" id="holding-list"></section>
        </section>

        <section class="screen" id="screen-trade" aria-label="交易">
          <section class="section-block">
            <div class="section-head">
              <h2>新增交易</h2>
              <span>本地草稿</span>
            </div>
            <form class="trade-form" id="trade-form">
              <label>
                日期
                <input id="trade-date" type="date">
              </label>
              <label>
                交易類型
                <select id="trade-type">
                  <option>買入</option>
                  <option>賣出</option>
                  <option>配息</option>
                  <option>分割</option>
                </select>
              </label>
              <label>
                市場
                <select id="trade-market">
                  <option>台股</option>
                  <option>美股</option>
                </select>
              </label>
              <label>
                股票代號
                <input id="trade-ticker" inputmode="latin" placeholder="0050 / VOO">
              </label>
              <div id="trade-dynamic-fields"></div>
              <div class="lot-selector hidden" id="trade-lot-selector"></div>
              <button class="secondary-button hidden" id="trade-cancel" type="button">取消賣出</button>
              <button class="primary-button" id="trade-submit" type="submit">送出交易</button>
              <div class="trade-result hidden" id="trade-result"></div>
            </form>
          </section>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主要導覽">
        <button class="nav-item active" data-screen="overview" type="button">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13.5 12 5l8 8.5"/><path d="M6.5 11.5V20h11v-8.5"/><path d="M10 20v-5h4v5"/></svg></span>
          總覽
        </button>
        <button class="nav-item" data-screen="trends" type="button">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 18h16"/><path d="m5 15 4-5 4 3 6-8"/><path d="M5 15h3.2"/><path d="M13 13h3.2"/></svg></span>
          趨勢
        </button>
        <button class="nav-item" data-screen="holdings" type="button">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 18V7"/><path d="M9 18V4"/><path d="M14 18v-8"/><path d="M19 18v-5"/><path d="M3 18h18"/></svg></span>
          股票
        </button>
        <button class="nav-item" data-screen="trade" type="button">
          <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg></span>
          交易
        </button>
      </nav>
    </div>

    <dialog id="day-dialog" class="day-dialog">
      <form method="dialog">
        <button class="dialog-close" aria-label="關閉">×</button>
      </form>
      <div id="day-detail"></div>
    </dialog>

    <dialog id="holding-dialog" class="detail-dialog">
      <form method="dialog">
        <button class="dialog-close" aria-label="關閉">×</button>
      </form>
      <div id="holding-detail"></div>
    </dialog>

    <dialog id="asset-edit-dialog" class="edit-dialog">
      <form method="dialog">
        <button class="dialog-close" aria-label="關閉">×</button>
      </form>
      <form class="edit-form" id="asset-edit-form">
        <h2 id="asset-edit-title">修改金額</h2>
        <label id="asset-edit-name-wrap">
          項目名稱
          <input id="asset-edit-name" type="text">
        </label>
        <label>
          金額
          <input id="asset-edit-amount" type="number" inputmode="numeric" step="1">
        </label>
        <label id="asset-edit-color-wrap">
          代表色
          <input id="asset-edit-color" type="color">
        </label>
        <div class="trade-result hidden" id="asset-edit-result"></div>
        <button class="danger-button hidden" id="asset-delete-button" type="button">刪除項目</button>
        <button class="primary-button" type="submit">儲存</button>
      </form>
    </dialog>

    <script src="./config.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
