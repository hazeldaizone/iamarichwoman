<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>重置 PWA 快取</title>
    <style>
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111113;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      main{width:min(320px,calc(100vw - 40px));padding:24px;border:1px solid #34343c;border-radius:18px;background:#1b1b1f;text-align:center}
      p{color:#a1a1aa;line-height:1.6}
    </style>
  </head>
  <body>
    <main>
      <h1>正在重置快取</h1>
      <p id="status">清除舊版 PWA 檔案中...</p>
    </main>
    <script>
      (async () => {
        const status = document.getElementById("status");
        try {
          if (navigator.serviceWorker) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((reg) => reg.unregister()));
          }
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
          status.textContent = "已清除，正在重新載入最新版...";
        } catch (err) {
          status.textContent = "清除時發生錯誤，仍會嘗試重新載入最新版。";
        }
        location.replace(`./?fresh=${Date.now()}`);
      })();
    </script>
  </body>
</html>
